# Paths are relative to cwd unless absolute.
input_h5ad: <path to the input h5ad file>
embeddings_root: <path to the embeddings root directory>
manipulations_dir: null  # optional; defaults to results_dir/manipulations
results_dir: <path to the results directory>
seed: 42
log_level: INFO

# Manipulation execution/output controls.
# Parallel workers speed up sweeps, but each worker holds one copy of the input AnnData in memory.
manipulation_workers: 4
overwrite_manipulations: true
slim_manipulated_outputs: true
h5ad_compression: gzip
gene_name_column: gene_name
ensembl_id_column: ensembl_id
hvg_n_top_genes: 2000

interventions:
  # - name: gene_shuffle
  #   kwargs:
  #     variant: [random, chromosome, chromosome_control]
  - name: local_smoothing
    kwargs:
      k: [5, 10, 20, 50, 100]
      n_pcs: 50
  - name: downsample
    kwargs:
      fraction: [0.4, 0.6, 0.8, 0.9, 0.95]
  - name: gene_dropout
    kwargs:
      dropout_rate: [0.1, 0.2, 0.4, 0.6]
  - name: poisson_resampling
    kwargs:
      iterations: [1, 2, 3, 4]

# Embeddings: embeddings_root/{model}/{model}_{intervention_id}.h5ad (see io.embedding_path).
reference_intervention_id: reference

models: [pca, scgpt, geneformer, scfoundation, scimilarity, scconcept]

# Structure evaluation (``make evaluate``): paired embedding vs reference per manipulation.
# scIB bio/batch metrics are separate: ``make evaluate-scib`` (reference embedding only).
# Trajectory inference metrics are separate: ``make evaluate-trajectory`` (reference embedding only).
evaluation:
  k_values: [5, 15, 50]
  distance_metrics: [euclidean]
  leiden_resolutions: [0.25, 0.5, 1.0, 2.0]
  cell_type_col: cell_type
  batch_col: batch
  dataset_id: null
  # Process pool size. Workers load a bootstrap snapshot built in the main process (spawn).
  evaluation_workers: 8
  # BLAS/sklearn threads for one-time reference setup in the main process (Leiden on reference).
  evaluation_setup_threads: 1
  # BLAS/sklearn threads inside each spawned worker during intervention metrics.
  evaluation_worker_threads: 1
  # Within-ref / within-man pairwise spread only (cell subsample then all-pairs).
  stats_shift_pairwise_cell_subsample_n: 500
  stats_shift_pairwise_max_pairs: 10000
  # Used by ``make evaluate-scib`` only (not ``make evaluate``).
  scib_benchmark_n_jobs: 1
  scib_enable_bio: true
  scib_enable_batch: true
  # Used by ``make evaluate-trajectory`` only (not ``make evaluate``).
  trajectory_key: trajectory
  trajectory_n_neighbors: 15
  trajectory_n_dcs: 10
  trajectory_n_permutations: 10
  distance_correlation_subsample_n: null
